name: 월간 코스트코 라벨 OCR 자동 실행

on:
  schedule:
    # 매월 2일 00:00 UTC (한국시간 매월 2일 09:00) 자동 실행.
    # 필요하면 크론 표현식을 바꾸세요: https://crontab.guru
    - cron: "0 0 2 * *"
  workflow_dispatch: {}  # Actions 탭에서 수동 실행도 가능

jobs:
  ocr-to-sheets:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          AZURE_VISION_ENDPOINT: ${{ secrets.AZURE_VISION_ENDPOINT }}
          AZURE_VISION_KEY: ${{ secrets.AZURE_VISION_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
