name: 코스트코 라벨 OCR 자동 실행 (15분 주기)

on:
  schedule:
    # 15분마다 실행해서, Drive에 새 사진이 올라오면 최대 15분 내로 자동 처리한다.
    # 새 파일이 없으면 목록 조회만 하고 몇 초 만에 끝나므로 GitHub Actions 무료
    # 사용량(Private 저장소 기준 월 2,000분)에 크게 영향 없다.
    # 간격을 바꾸고 싶으면 아래 크론 표현식만 수정: https://crontab.guru
    #
    # (스케줄 재등록 유도용 소소한 편집: 최초 등록 후 자동 실행이 한참 안 잡히는
    # 경우가 있어 워크플로 파일을 다시 커밋해 GitHub 스케줄러가 새로 인식하도록 함)
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # Actions 탭에서 수동 실행도 계속 가능

# 사진을 대량으로 올린 직후라 한 번 실행이 오래 걸리는 중(최대 90분 이상)에
# 다음 15분 주기가 겹쳐서 시작되면, 같은 파일을 두 실행이 동시에 처리해서
# 시트에 중복 행이 쌓일 수 있다. 이전 실행이 끝날 때까지 다음 실행을 대기시켜
# 항상 한 번에 하나씩만 돌게 한다.
concurrency:
  group: ocr-to-sheets
  cancel-in-progress: false

jobs:
  ocr-to-sheets:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          AZURE_VISION_ENDPOINT: ${{ secrets.AZURE_VISION_ENDPOINT }}
          AZURE_VISION_KEY: ${{ secrets.AZURE_VISION_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
