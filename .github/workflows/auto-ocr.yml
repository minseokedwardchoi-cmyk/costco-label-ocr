name: 코스트코 라벨 OCR 실행 (대시보드 트리거 / 수동 실행)

on:
  workflow_dispatch:  # 대시보드의 "업데이트" 버튼이 GitHub REST API로 이 트리거를 호출한다.
                       # 연동 방법은 DASHBOARD_INTEGRATION.md 참고. Actions 탭에서
                       # 사람이 수동으로 Run workflow를 눌러도 똑같이 동작한다.
    inputs:
      costco_folder_id:
        description: "코스트코 Drive 폴더 ID 임시 지정 (소량 테스트용). 비워두면 기본 폴더(DRIVE_FOLDER_ID_COSTCO 시크릿)를 그대로 씀"
        required: false
        default: ""
      traders_folder_id:
        description: "트레이더스 Drive 폴더 ID 임시 지정 (소량 테스트용). 비워두면 기본 폴더(DRIVE_FOLDER_ID_TRADERS 시크릿)를 그대로 씀"
        required: false
        default: ""

# 대시보드 버튼을 짧은 시간에 여러 번 누르거나, 이전 실행이 아직 끝나기 전에
# 다시 트리거되면(대량 업로드 직후 OCR이 오래 걸리는 경우) 같은 파일이 중복
# 처리될 수 있다. 이전 실행이 끝날 때까지 다음 실행을 대기시켜 항상 한 번에
# 하나씩만 돌게 한다.
concurrency:
  group: ocr-to-sheets
  cancel-in-progress: false

jobs:
  ocr-to-sheets:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          DRIVE_FOLDER_ID_COSTCO: ${{ github.event.inputs.costco_folder_id || secrets.DRIVE_FOLDER_ID_COSTCO }}
          DRIVE_FOLDER_ID_TRADERS: ${{ github.event.inputs.traders_folder_id || secrets.DRIVE_FOLDER_ID_TRADERS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          AZURE_VISION_ENDPOINT: ${{ secrets.AZURE_VISION_ENDPOINT }}
          AZURE_VISION_KEY: ${{ secrets.AZURE_VISION_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
